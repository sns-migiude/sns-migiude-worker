# 上流（sns-migiude/worker の main＝安定版）を自分のフォークに毎日取り込む自動同期。
# これがONだと、運営がアップデートを出すと自動でフォークが更新され、Cloudflareが自動再デプロイします。
# ※GitHubはfork上のActionを既定で無効化します。フォーク後に一度だけ「Enable workflows」を押してください。
name: Sync with upstream
on:
  schedule:
    - cron: "0 18 * * *"   # 毎日およそ 03:00 JST に同期
  workflow_dispatch: {}     # 「Run workflow」で今すぐ同期も可能
permissions:
  contents: write
concurrency:
  group: sync-upstream
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror upstream main
        run: |
          git config user.name "sns-migiude-sync"
          git config user.email "sync@users.noreply.github.com"
          git remote add upstream https://github.com/sns-migiude/worker.git
          git fetch upstream main
          git checkout main
          git reset --hard upstream/main
          git push origin main --force
