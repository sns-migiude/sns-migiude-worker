name: Sync with upstream
on:
  schedule:
    - cron: "0 18 * * *"   # 毎日およそ 03:00 JST に同期
  workflow_dispatch: {}     # 「Run workflow」で今すぐ同期も可能
permissions:
  contents: write
concurrency:
  group: sync-upstream
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror upstream main (keep own workflows)
        run: |
          git config user.name "sns-migiude-sync"
          git config user.email "sync@users.noreply.github.com"
          git remote add upstream https://github.com/sns-migiude/sns-migiude-worker.git
          git fetch upstream main
          git checkout main
          KEEP=$(git rev-parse HEAD)
          git reset --hard upstream/main
          # GITHUB_TOKENはワークフローファイルを変更できないため、自分の .github/workflows を維持したまま同期する
          git rm -r -q --ignore-unmatch .github/workflows
          git checkout "$KEEP" -- .github/workflows
          git add -A
          git commit -m "sync: mirror upstream (keep own workflows)" || true
          git push origin main --force
