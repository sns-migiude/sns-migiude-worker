name: Sync with upstream
on:
  schedule:
    # 1日3回・JST 03:37 / 11:37 / 19:37（毎時0分は混雑して遅れるので37分に散らす）
    - cron: "37 2,10,18 * * *"
  workflow_dispatch: {}     # 「Run workflow」で今すぐ同期も可能
permissions:
  contents: write
concurrency:
  group: sync-upstream
  cancel-in-progress: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Mirror upstream main (keep own workflows, skip if unchanged)
        run: |
          git config user.name "sns-migiude-sync"
          git config user.email "sync@users.noreply.github.com"
          git remote add upstream https://github.com/sns-migiude/sns-migiude-worker.git
          git fetch upstream main
          git checkout main
          KEEP=$(git rev-parse HEAD)
          git reset --hard upstream/main
          # GITHUB_TOKENはワークフローファイルを変更できないため、自分の .github/workflows を維持したまま同期する
          git rm -r -q --ignore-unmatch .github/workflows
          git checkout "$KEEP" -- .github/workflows
          git add -A
          # 上流に変更が無ければ push しない＝無駄な再ビルドを起こさない（1日3回でも実ビルドは更新時だけ）
          if git diff --cached --quiet "$KEEP"; then
            echo "上流に更新なし。ビルドは起こさない。"
            git reset --hard "$KEEP"
          else
            git commit -m "sync: mirror upstream (keep own workflows)"
            git push origin main --force
          fi
